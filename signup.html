<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account - Hisab</title>
  <link rel="stylesheet" href="src/css/style.css">
  <link rel="stylesheet" href="src/css/auth.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <main class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <h1>Hisab</h1>
      </div>
      <h2 class="auth-title">Create Account</h2>
      <p class="auth-subtitle">Start tracking your udhari</p>

      <form id="signupForm" novalidate>
        <div class="form-group">
          <label for="fullName">Full Name</label>
          <div class="input-wrapper">
            <input type="text" id="fullName" placeholder="Your full name" required autocomplete="name">
          </div>
          <div class="field-error" id="fullNameError"></div>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <div class="input-wrapper">
            <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
          </div>
          <div class="field-error" id="emailError"></div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <input type="password" id="password" placeholder="Create a password" required autocomplete="new-password">
            <button type="button" class="password-toggle" id="passwordToggle" aria-label="Toggle password visibility">
              👁
            </button>
          </div>
          <div class="field-error" id="passwordError"></div>
          <div class="password-strength">
            <div class="strength-bar">
              <div class="strength-bar-fill" id="strengthBarFill"></div>
            </div>
            <div class="strength-label" id="strengthLabel"></div>
          </div>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <div class="input-wrapper">
            <input type="password" id="confirmPassword" placeholder="Confirm your password" required autocomplete="new-password">
            <button type="button" class="password-toggle" id="confirmPasswordToggle" aria-label="Toggle password visibility">
              👁
            </button>
          </div>
          <div class="field-error" id="confirmPasswordError"></div>
        </div>

        <button type="submit" class="auth-button" id="submitBtn">Create Account</button>
      </form>

      <div class="auth-links" style="margin-top: 1.25rem;">
        Already have an account? <a href="login.html">Sign In</a>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script type="module" src="src/js/pages/signup.js"></script>
</body>
</html>
