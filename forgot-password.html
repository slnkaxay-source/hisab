<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - Hisab</title>
  <link rel="stylesheet" href="src/css/style.css">
  <link rel="stylesheet" href="src/css/auth.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <main class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <h1>Hisab</h1>
      </div>

      <div id="forgotForm">
        <h2 class="auth-title">Forgot Password?</h2>
        <p class="auth-subtitle">Enter your email and we'll send you a reset link</p>

        <form id="forgotPasswordForm" novalidate>
          <div class="form-group">
            <label for="email">Email</label>
            <div class="input-wrapper">
              <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
            </div>
            <div class="field-error" id="emailError"></div>
          </div>

          <button type="submit" class="auth-button" id="submitBtn">Send Reset Link</button>
        </form>
      </div>

      <div id="successState" style="display: none;">
        <div class="success-message">
          <div class="icon">✉️</div>
          <h2>Check your email</h2>
          <p>We've sent a password reset link to your email address.</p>
        </div>
      </div>

      <div class="auth-links" style="margin-top: 1.25rem;">
        <a href="login.html">Back to Login</a>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script type="module" src="src/js/pages/forgotPassword.js"></script>
</body>
</html>
