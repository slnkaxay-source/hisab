<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Hisab</title>
  <link rel="stylesheet" href="src/css/style.css">
  <link rel="stylesheet" href="src/css/dashboard.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h1 class="sidebar-logo">Hisab</h1>
      </div>
      <nav class="sidebar-nav">
        <a href="#dashboard" class="nav-item active" data-page="dashboard">
          <span class="nav-icon">&#9632;</span>
          <span>Dashboard</span>
        </a>
        <a href="#friends" class="nav-item" data-page="friends">
          <span class="nav-icon">&#9640;</span>
          <span>Friends</span>
        </a>
        <a href="#requests" class="nav-item" data-page="requests">
          <span class="nav-icon">&#9993;</span>
          <span>Requests</span>
        </a>
        <a href="#notifications" class="nav-item" data-page="notifications">
          <span class="nav-icon">&#128276;</span>
          <span>Notifications</span>
          <span class="nav-badge" id="sidebar-badge">0</span>
        </a>
        <a href="#profile" class="nav-item" data-page="profile">
          <span class="nav-icon">&#128100;</span>
          <span>Profile</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <a href="#" class="nav-item logout-btn" id="sidebar-logout">
          <span class="nav-icon">&#8617;</span>
          <span>Logout</span>
        </a>
      </div>
    </aside>

    <main class="main-content">
      <header class="top-bar">
        <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">&#9776;</button>
        <div class="top-bar-right">
          <button class="icon-btn notification-bell" id="topbar-notifications" aria-label="Notifications">
            &#128276;
            <span class="badge" id="topbar-badge">0</span>
          </button>
          <div class="avatar" id="topbar-avatar">&#128100;</div>
        </div>
      </header>
      <div class="page-content" id="page-content"></div>
    </main>

    <nav class="bottom-nav" id="bottomNav">
      <a href="#dashboard" class="bottom-nav-item active" data-page="dashboard">
        <span class="bottom-nav-icon">&#9632;</span>
        <span class="bottom-nav-label">Dashboard</span>
      </a>
      <a href="#friends" class="bottom-nav-item" data-page="friends">
        <span class="bottom-nav-icon">&#9640;</span>
        <span class="bottom-nav-label">Friends</span>
      </a>
      <a href="#requests" class="bottom-nav-item" data-page="requests">
        <span class="bottom-nav-icon">&#9993;</span>
        <span class="bottom-nav-label">Requests</span>
      </a>
      <a href="#notifications" class="bottom-nav-item" data-page="notifications">
        <span class="bottom-nav-icon">&#128276;</span>
        <span class="bottom-nav-label">Notifs</span>
        <span class="nav-badge bottom-badge" id="bottom-badge">0</span>
      </a>
      <a href="#profile" class="bottom-nav-item" data-page="profile">
        <span class="bottom-nav-icon">&#128100;</span>
        <span class="bottom-nav-label">Profile</span>
      </a>
    </nav>
  </div>

  <script type="module" src="src/js/pages/dashboard.js"></script>
</body>
</html>
